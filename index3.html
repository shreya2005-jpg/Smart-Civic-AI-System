<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Registration Form</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="fullname" class="form-control" required>
            </div>
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" id="firstname" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Middle Name:</label>
                <input type="text" id="middlename" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" id="lastname" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Aadhaar Number:</label>
                <input type="text" id="aadhaar" class="form-control" required>
                <small class="text-danger" id="aadhaarError"></small>
            </div>
            <div class="form-group">
                <label>PAN Card Number:</label>
                <input type="text" id="pan" class="form-control" required>
                <small class="text-danger" id="panError"></small>
            </div>
            <div class="form-group">
                <label>Mobile Number:</label>
                <input type="text" id="mobile" class="form-control" required>
                <small class="text-danger" id="mobileError"></small>
            </div>
            <div class="form-group">
                <label>Date of Birth:</label>
                <input type="date" id="dob" class="form-control" required>
                <small class="text-danger" id="dobError"></small>
            </div>
            <div class="form-group">
                <label>Marks of Six Subjects:</label>
                <input type="text" id="marks" class="form-control" placeholder="Enter six marks separated by commas" required>
                <small class="text-danger" id="marksError"></small>
            </div>
            <div class="form-group">
                <label>Best Five Percentage:</label>
                <input type="text" id="percentage" class="form-control" readonly>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</body>
</html>
